<section class="content">
    <h2>Prodej vlastního šperku</h2>

    <form onsubmit="submitProduct(event)">
        <input type="text" placeholder="Název produktu" id="name" required>
        <input type="number" placeholder="Cena (Kč)" id="price" required>
        
        <select id="category">
            <option>Prsten</option>
            <option>Náramek</option>
            <option>Náhrdelník</option>
            <option>Piercing</option>
        </select>

        <textarea placeholder="Popis produktu" id="desc"></textarea>

        <button type="submit">Přidat produkt</button>
    </form>

    <h3>Nově přidané produkty:</h3>
    <div id="user-products"></div>
